    <link rel="manifest" id="pwa-manifest" href="/manifest.json" />
    <meta name="theme-color" content="#cc0000" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />

  <body>
    <div id="root"></div>
    <noscript>
      <div style="display: flex; align-items: center; justify-content: center; height: 100vh; background-color: #0a0a0a; color: #ffffff; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;">
        <div style="text-align: center;">
          <p>JavaScript is required to use this application.</p>
          <p style="font-size: 0.875rem; color: #999; margin-top: 1rem;">Please enable JavaScript in your browser settings.</p>
        </div>
      </div>
    </noscript>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').catch(() => {});
        });
      }

      const isAdmin = location.pathname.startsWith('/carlift-admin');
      const manifest = document.getElementById('pwa-manifest');
      if (manifest && isAdmin) {
        manifest.href = '/manifest-admin.json';
      }
    </script>
  </body>
