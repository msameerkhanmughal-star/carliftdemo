<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a0000"/>
      <stop offset="100%" stop-color="#000000"/>
    </linearGradient>
    <linearGradient id="carGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ff2222"/>
      <stop offset="100%" stop-color="#cc0000"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="64" height="64" rx="12" ry="12" fill="url(#bgGrad)"/>

  <!-- Red top stripe -->
  <rect x="0" y="0" width="64" height="5" rx="0" fill="#cc0000" opacity="0.9"/>
  <rect x="0" y="0" width="64" height="5" rx="12" fill="#cc0000"/>

  <!-- Car body -->
  <g filter="url(#glow)" transform="translate(8, 18)">
    <!-- Car roof/cabin -->
    <path d="M14,14 L18,7 L30,7 L34,14 Z" fill="url(#carGrad)" stroke="#ff4444" stroke-width="0.5"/>
    <!-- Car body -->
    <rect x="6" y="14" width="36" height="12" rx="2" fill="url(#carGrad)" stroke="#ff4444" stroke-width="0.5"/>
    <!-- Windshield -->
    <path d="M17,14 L20,9 L28,9 L31,14 Z" fill="#1a0000" opacity="0.8"/>
    <!-- Windows -->
    <rect x="20" y="9" width="8" height="5" rx="1" fill="#330000" opacity="0.6"/>
    <!-- Wheels -->
    <circle cx="15" cy="26" r="5" fill="#111" stroke="#ff0000" stroke-width="1.5"/>
    <circle cx="15" cy="26" r="2" fill="#ff0000"/>
    <circle cx="33" cy="26" r="5" fill="#111" stroke="#ff0000" stroke-width="1.5"/>
    <circle cx="33" cy="26" r="2" fill="#ff0000"/>
    <!-- Headlight -->
    <rect x="6" y="16" width="5" height="3" rx="1" fill="#ffcc00" opacity="0.9"/>
    <!-- Taillight -->
    <rect x="37" y="16" width="5" height="3" rx="1" fill="#ff0000" opacity="0.9"/>
    <!-- Ground shadow -->
    <ellipse cx="24" cy="32" rx="22" ry="2" fill="#ff0000" opacity="0.12"/>
  </g>

  <!-- Bottom red bar -->
  <rect x="8" y="54" width="48" height="3" rx="1.5" fill="#ff0000" opacity="0.9"/>
  <!-- Bar endcaps -->
  <circle cx="8" cy="55.5" r="1.5" fill="#ff0000"/>
  <circle cx="56" cy="55.5" r="1.5" fill="#ff0000"/>
</svg>
